layers:
  - id: L1
    name: hard_facts
    precedence: 100
    scope: global
  - id: L2
    name: author_intent
    precedence: 80
    scope: book
  - id: L3
    name: planning
    precedence: 60
    scope: arc
  - id: L4
    name: current_task
    precedence: 70
    scope: local
sections:
  hard:
    - story_frame
    - current_state
    - book_rules
    - roles
  soft:
    - author_intent
    - current_focus
    - volume_map
  diagnostic:
    - anti_ai_checks
    - continuity_audit
    - style_regression_checks
overrideEdges:
  - from: L4
    to: L3
    allowed: true
    scope: current_chapter
  - from: L4
    to: L2
    allowed: false
    scope: current_chapter
  - from: L4
    to: L1
    allowed: false
    scope: current_chapter
activeOverrides:
  - from: L4
    to: L3
    target: chapter:12/mustAvoid
    reason: 禁止帝王将相视角占据前台叙事
  - from: L4
    to: L3
    target: chapter:12/mustAvoid
    reason: 禁止血腥细节描写（暴力只写后果不写过程）
  - from: L4
    to: L3
    target: chapter:12/mustAvoid
    reason: 禁止感情线露骨描写（暧昧暗示不越线）
  - from: L4
    to: L3
    target: chapter:12/mustAvoid
    reason: 禁止机械降神式营救或解决冲突
  - from: L4
    to: L3
    target: chapter:12/mustAvoid
    reason: 禁止配角降智配合主角
